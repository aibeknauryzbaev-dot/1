<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монеталар дүкені - Топқа бөлу</title>
    <style>
        :root {
            --shop-wall: #fef3c7;
            --shop-shelf: #d97706;
            --accent-pink: #f472b6;
            --accent-blue: #60a5fa;
            --coin-1: #b45309; 
            --coin-2: #94a3b8; 
            --coin-5: #facc15; 
            --coin-10: #fb923c; 
            --text-main: #1e293b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(to bottom, #bae6fd 0%, #e0f2fe 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding-top: 10px;
            overflow-y: auto;
            position: relative;
        }

        /* Декорациялар */
        .shop-decoration {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: #92400e;
            border-top: 10px solid #b45309;
            z-index: -1;
        }

        .shelf {
            position: fixed;
            width: 100%;
            height: 15px;
            background: #d97706;
            z-index: -1;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
        .shelf-1 { top: 15%; }
        .shelf-2 { top: 40%; }

        .container {
            width: 95%;
            max-width: 850px;
            z-index: 10;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.98);
            border: 6px solid var(--accent-blue);
            border-radius: 40px;
            padding: 20px 40px;
            box-shadow: 0 15px 0 rgba(0, 0, 0, 0.1);
            position: relative;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: #1d4ed8;
            text-shadow: 2px 2px 0px #bfdbfe;
        }

        .setup-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .input-group {
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 1.1rem;
            color: #1e40af;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 15px;
            border: 3px solid #bfdbfe;
            background: #f0f9ff;
            color: #1e3a8a;
            font-size: 1.1rem;
            outline: none;
        }

        .preview-box {
            background: #eff6ff;
            padding: 15px;
            border-radius: 25px;
            border: 2px dashed #60a5fa;
        }

        .group-preview {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 5px;
        }

        .coin-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            border: 4px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1);
        }

        .btn-start {
            background: #22c55e;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: 900;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 0 #15803d;
            margin-top: 10px;
        }

        .btn-start:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #15803d;
        }

        .screen {
            display: none;
            animation: bounceIn 0.5s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Ойын барысындағы индикаторлар */
        .live-counter-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
            padding: 10px;
            background: #f8fafc;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
        }

        .live-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .live-count-circle {
            background: white;
            padding: 2px 10px;
            border-radius: 10px;
            border: 2px solid #cbd5e1;
            font-weight: bold;
            color: #1e3a8a;
        }

        .big-coin {
            width: 180px;
            height: 180px;
            background: #fbbf24;
            border-radius: 50%;
            margin: 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6rem;
            cursor: pointer;
            border: 10px solid #d97706;
            box-shadow: 0 10px 0 #b45309;
            color: #78350f;
            user-select: none;
        }

        .big-coin.spinning {
            animation: coinJump 0.6s ease-in-out;
        }

        @keyframes coinJump {
            0% { transform: translateY(0) rotateY(0); }
            50% { transform: translateY(-30px) rotateY(180deg); }
            100% { transform: translateY(0) rotateY(360deg); }
        }

        .result-msg {
            font-size: 1.8rem;
            font-weight: 900;
            height: 60px;
            margin-top: 10px;
            color: #1e3a8a;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .group-card {
            background: white;
            border: 3px solid #bfdbfe;
            border-radius: 20px;
            padding: 12px;
            text-align: left;
        }

        .student-list {
            list-style: none;
            margin-top: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .student-list li {
            padding: 4px;
            background: #f8fafc;
            margin-bottom: 2px;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .c-1 { background: #cd7f32; color: white; }
        .c-2 { background: #e2e8f0; color: #1e293b; }
        .c-5 { background: #facc15; color: #451a03; }
        .c-10 { background: #fb923c; color: #451a03; }

    </style>
</head>
<body>

    <div class="shelf shelf-1"></div>
    <div class="shelf shelf-2"></div>
    <div class="shop-decoration"></div>

    <div class="container">
        <div class="main-card">
            
            <!-- Баптау -->
            <div id="setup-screen" class="screen active">
                <h1>🛒 Монеталар дүкені</h1>
                <div class="setup-section">
                    <div class="input-row">
                        <div class="input-group">
                            <label>Оқушы саны:</label>
                            <input type="number" id="student-count" value="20" min="2" max="40">
                        </div>
                        <div class="input-group">
                            <label>Топ саны:</label>
                            <input type="number" id="group-count" value="3" min="2" max="4" oninput="updatePreview()">
                        </div>
                    </div>
                    
                    <div class="preview-box">
                        <label>Ойын монеталары:</label>
                        <div id="group-preview" class="group-preview"></div>
                    </div>

                    <button class="btn-start" onclick="startGrouping()">ТОПҚА БӨЛУДІ БАСТАУ 🚀</button>
                </div>
            </div>

            <!-- Ойын барысы (Бөлу кезі) -->
            <div id="play-screen" class="screen">
                <div style="font-size: 1.5rem; font-weight: bold; color: #1d4ed8;">
                    <span id="current-student-num">1</span>-оқушы, монетаны ал!
                </div>

                <!-- ЖАНДЫ САНАҒЫШ (Live Counter) -->
                <div id="live-counter" class="live-counter-container">
                    <!-- Бұл жерге топтардың қазіргі саны шығады -->
                </div>
                
                <div id="main-coin" class="big-coin" onclick="handleCoinClick()">₸</div>

                <div id="result-message" class="result-msg"></div>

                <button class="btn-start" style="padding: 8px 20px; font-size: 0.9rem; background: #94a3b8; box-shadow: 0 4px 0 #64748b;" onclick="resetApp()">Артқа қайту</button>
            </div>

            <!-- Нәтиже -->
            <div id="result-screen" class="screen">
                <h1 style="font-size: 1.8rem;">Топтар тізімі</h1>
                <div id="final-results-grid" class="results-grid"></div>
                <button class="btn-start" style="margin-top: 15px;" onclick="resetApp()">ҚАЙТА БАСТАУ 🔄</button>
            </div>

        </div>
    </div>

    <script>
        let totalStudents = 0;
        let numGroups = 0;
        let studentSequence = [];
        let currentIdx = 0;
        let isMoving = false;

        const coinTypes = [
            { val: 1, name: "1 теңге", color: "c-1", hex: "#b45309" },
            { val: 2, name: "2 теңге", color: "c-2", hex: "#64748b" },
            { val: 5, name: "5 теңге", color: "c-5", hex: "#d97706" },
            { val: 10, name: "10 теңге", color: "c-10", hex: "#c2410c" }
        ];

        let activeGroups = [];

        function updatePreview() {
            let count = parseInt(document.getElementById('group-count').value);
            if (count < 2) count = 2;
            if (count > 4) count = 4;
            document.getElementById('group-count').value = count;

            const preview = document.getElementById('group-preview');
            preview.innerHTML = '';
            
            for (let i = 0; i < count; i++) {
                const coin = coinTypes[i];
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="coin-icon ${coin.color}">${coin.val}</div>
                    <div style="font-size: 0.8rem; font-weight: bold;">${coin.name}</div>
                `;
                preview.appendChild(div);
            }
        }

        function renderLiveCounters() {
            const container = document.getElementById('live-counter');
            container.innerHTML = '';
            activeGroups.forEach((group, index) => {
                const item = document.createElement('div');
                item.className = 'live-item';
                item.innerHTML = `
                    <div class="coin-icon ${group.color}" style="width:35px; height:35px; font-size:0.8rem; border-width:2px;">${group.val}</div>
                    <div class="live-count-circle" id="live-count-${index}">0</div>
                `;
                container.appendChild(item);
            });
        }

        function startGrouping() {
            totalStudents = parseInt(document.getElementById('student-count').value);
            numGroups = parseInt(document.getElementById('group-count').value);

            if (totalStudents < numGroups) {
                alert("Оқушы саны топ санынан аз!");
                return;
            }

            activeGroups = [];
            for (let i = 0; i < numGroups; i++) {
                activeGroups.push({ ...coinTypes[i], members: [] });
            }

            renderLiveCounters();

            studentSequence = [];
            for (let i = 0; i < totalStudents; i++) {
                studentSequence.push(i % numGroups);
            }
            
            for (let i = studentSequence.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [studentSequence[i], studentSequence[j]] = [studentSequence[j], studentSequence[i]];
            }

            currentIdx = 0;
            document.getElementById('current-student-num').textContent = "1";
            document.getElementById('result-message').textContent = "";
            switchScreen('play-screen');
        }

        function handleCoinClick() {
            if (isMoving || currentIdx >= totalStudents) return;
            isMoving = true;

            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(1500, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);

            const coinEl = document.getElementById('main-coin');
            coinEl.classList.add('spinning');

            const groupIdx = studentSequence[currentIdx];
            const group = activeGroups[groupIdx];
            group.members.push(`${currentIdx + 1}-оқушы`);

            setTimeout(() => {
                // Тікелей санағышты жаңарту
                document.getElementById(`live-count-${groupIdx}`).textContent = group.members.length;
                
                const msg = document.getElementById('result-message');
                msg.textContent = `Сен ${group.name} тобына түстің! 💰`;
                msg.style.color = group.hex;

                setTimeout(() => {
                    coinEl.classList.remove('spinning');
                    msg.textContent = "";
                    currentIdx++;

                    if (currentIdx < totalStudents) {
                        document.getElementById('current-student-num').textContent = currentIdx + 1;
                        isMoving = false;
                    } else {
                        showResults();
                    }
                }, 1600);
            }, 600);
        }

        function showResults() {
            const grid = document.getElementById('final-results-grid');
            grid.innerHTML = '';

            activeGroups.forEach(g => {
                const card = document.createElement('div');
                card.className = 'group-card';
                card.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div class="coin-icon ${g.color}" style="width:30px; height:30px; font-size:0.8rem; border-width:2px;">${g.val}</div>
                        <b style="font-size:0.9rem">${g.name}</b>
                    </div>
                    <p style="margin-top:5px; color:#1d4ed8; font-size:0.8rem;">Саны: ${g.members.length}</p>
                    <ul class="student-list">${g.members.map(m => `<li>${m}</li>`).join('')}</ul>
                `;
                grid.appendChild(card);
            });
            switchScreen('result-screen');
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function resetApp() {
            switchScreen('setup-screen');
            isMoving = false;
        }

        window.onload = updatePreview;
    </script>
</body>
</html>
